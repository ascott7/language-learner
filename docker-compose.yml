services:
  anki-service:
    build: ./anki-service
    ports:
      - "${ANKI_SERVICE_PORT:-5001}:5000"
    volumes:
      # Named volume — collection persists across container restarts
      - anki-data:/data
    environment:
      - ANKI_DB_PATH=/data/collection.anki2
      - ANKIWEB_USERNAME=${ANKIWEB_USERNAME}
      - ANKIWEB_PASSWORD=${ANKIWEB_PASSWORD}
    restart: unless-stopped

volumes:
  anki-data:
